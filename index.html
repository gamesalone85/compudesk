<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompuDesk</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">   
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- HERO -->
<section id="inicio" class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>Reparación de computadoras en CDMX</h1>
        <p>Servicio rápido, confiable y a domicilio</p>
        <a href="#contacto" class="btn">Solicitar servicio</a>
    </div>
</section>

<!-- FLYERS -->
<section class="flyers container">
    <h2>Promociones</h2>

    <div class="grid">
        <img src="img/4.jpg">
        <img src="img/2.jpg">
        <img src="img/3.jpg">
    </div>
</section>

<!-- SERVICIOS -->
<section id="servicios" class="section">
    <h2>Servicios</h2>

    <div class="grid">
        <div class="card">Mantenimiento</div>
        <div class="card">Formateo</div>
        <div class="card">Eliminación de virus</div>
    </div>
</section>

<!-- PRODUCTOS -->
<section id="productos" class="section">
    <h2>Productos</h2>

    <div class="grid">
        <div class="card">Memorias RAM</div>
        <div class="card">Discos SSD</div>
        <div class="card">Accesorios</div>
    </div>
</section>

<!-- ANUNCIOS -->
<section id="anuncios" class="section dark">
    <h2>Anuncios</h2>

    <div class="grid">
        <div class="card">Promoción activa</div>
        <div class="card">Ofertas especiales</div>
    </div>
</section>

<!-- CONTACTO -->
<section id="contacto" class="section contact">
    <h2>Contacto</h2>

    <a href="https://wa.me/521XXXXXXXXXX" class="btn">
        WhatsApp
    </a>
</section>

<!-- FOOTER -->
<div id="footer"></div>

<script src="js/layout.js"></script>

</body>
</html>
