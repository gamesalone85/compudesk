<!DOCTYPE html>
<html lang="es-MX">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Nuevo Usuario | Compu Desk Admin
</title>


<link rel="icon" href="../../img/logo.png">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<link rel="stylesheet" href="../css/dashboard.css">

<link rel="stylesheet" href="usuarios.css">


</head>


<body>


<div class="admin-layout">


<div id="sidebar"></div>



<main class="admin-content">


<div id="header"></div>





<section class="page-header">


<div>


<h2>

<i class="fa-solid fa-user-plus"></i>

Nuevo Usuario

</h2>


<p>

Registrar usuario para el portal Compu Desk.

</p>


</div>



<a href="index.html"
class="btn-primary">


<i class="fa-solid fa-arrow-left"></i>

Regresar


</a>


</section>







<section class="table-container">


<form id="usuarioForm">



<div class="form-grid">





<div class="form-group">

<label>

Nombre completo

</label>


<input

type="text"

id="nombre"

required

placeholder="Nombre del usuario">

</div>







<div class="form-group">

<label>

Correo electrónico

</label>


<input

type="email"

id="correo"

required

placeholder="usuario@email.com">

</div>



<div class="form-group">

<label>

Contraseña temporal

</label>


<input

type="password"

id="password"

required

placeholder="Contraseña inicial">

</div>



<div class="form-group">

<label>

Teléfono

</label>


<input

type="tel"

id="telefono"

placeholder="5555555555">

</div>







<div class="form-group">

<label>

Empresa

</label>


<input

type="text"

id="empresa"

placeholder="Empresa asociada">

</div>








<div class="form-group">

<label>

Rol

</label>


<select id="rol">


<option value="cliente">

Cliente

</option>


<option value="tecnico">

Técnico

</option>


<option value="supervisor">

Supervisor

</option>


<option value="admin">

Administrador

</option>


</select>


</div>







<div class="form-group">

<label>

Estado

</label>


<select id="estado">


<option value="activo">

Activo

</option>


<option value="inactivo">

Inactivo

</option>


</select>


</div>






</div>






<button

type="submit"

class="btn-primary">


<i class="fa-solid fa-save"></i>


Guardar usuario


</button>



<div id="mensaje"></div>




</form>




</section>





</main>


</div>







<script type="module"
src="../js/auth-guard.js"></script>



<script type="module"
src="../js/nuevo-usuario.js"></script>




</body>

</html>
