<!DOCTYPE html>
<html lang="es-MX">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Nuevo Cliente | Compu Desk Admin
</title>


<link rel="icon" href="../../img/logo.png">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<link rel="stylesheet" href="../css/admin.css">

<link rel="stylesheet" href="clientes.css">


</head>


<body>


<div class="admin-layout">


<div id="sidebar"></div>



<main class="admin-content">


<div id="header"></div>



<section class="page-header">


<div>

<h2>
Nuevo Cliente
</h2>

<p>
Registrar empresa o usuario para servicios Compu Desk.
</p>

</div>



<a href="index.html"
class="btn-primary">

<i class="fa-solid fa-arrow-left"></i>

Regresar

</a>


</section>





<section class="form-container">


<form id="clienteForm">



<div class="form-grid">



<div class="form-group">

<label>

Empresa / Nombre completo

</label>


<input

type="text"

id="empresa"

required

placeholder="Ejemplo: Hotel XYZ">

</div>





<div class="form-group">

<label>

Persona de contacto

</label>


<input

type="text"

id="contacto"

required

placeholder="Nombre del responsable">

</div>






<div class="form-group">

<label>

Correo electrónico

</label>


<input

type="email"

id="correo"

required

placeholder="cliente@email.com">

</div>






<div class="form-group">

<label>

Teléfono

</label>


<input

type="tel"

id="telefono"

placeholder="5555555555">

</div>






<div class="form-group">


<label>

Tipo de cliente

</label>


<select id="tipo">


<option value="empresa">

Empresa

</option>


<option value="hogar">

Usuario hogar

</option>


</select>


</div>







<div class="form-group">


<label>

Plan contratado

</label>


<select id="plan">


<option value="basico">

Soporte Básico

</option>


<option value="premium">

Soporte Premium

</option>


<option value="empresarial">

Soporte Empresarial

</option>


</select>


</div>








<div class="form-group">


<label>

Estado

</label>


<select id="estado">


<option value="activo">

Activo

</option>


<option value="pendiente">

Pendiente

</option>


<option value="inactivo">

Inactivo

</option>


</select>


</div>





</div>





<button

type="submit"

class="btn-primary">


<i class="fa-solid fa-save"></i>

Guardar cliente


</button>



<div id="mensaje"></div>



</form>



</section>



</main>


</div>





<script type="module" src="../js/auth-guard.js"></script>

<script type="module" src="../js/nuevo-cliente.js"></script>



</body>


</html>
