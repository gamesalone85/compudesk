<!DOCTYPE html>
<html lang="es-MX">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Clientes | Compu Desk Admin
</title>


<meta name="robots" content="noindex,nofollow">


<link rel="icon" href="../../img/logo.png">


<!-- Font Awesome -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">



<!-- CSS ADMIN -->

<link rel="stylesheet" href="../css/admin.css">


<!-- CSS CLIENTES -->

<link rel="stylesheet" href="clientes.css">



</head>


<body>



<div class="admin-layout">



    <!-- SIDEBAR -->

    <aside id="sidebar"></aside>





    <main class="admin-content">



        <!-- HEADER -->

        <header id="header"></header>






        <section class="page-header">



            <div>


                <h2>

                    Gestión de Clientes

                </h2>



                <p>

                    Administración de empresas y usuarios registrados.

                </p>



            </div>





            <a href="nuevo.html"
               class="btn-primary">


                <i class="fa-solid fa-plus"></i>


                Nuevo cliente



            </a>




        </section>









        <section class="client-summary">





            <div class="client-card">


                <i class="fa-solid fa-building"></i>



                <div>


                    <span>

                        Clientes registrados

                    </span>



                    <strong id="totalClientes">

                        0

                    </strong>



                </div>



            </div>









            <div class="client-card">



                <i class="fa-solid fa-users"></i>




                <div>


                    <span>

                        Usuarios creados

                    </span>




                    <strong id="totalUsuarios">

                        0

                    </strong>




                </div>



            </div>





        </section>









        <section class="table-container">





            <div class="table-header">



                <h3>

                    Clientes registrados

                </h3>





                <input

                type="search"

                id="buscarCliente"

                placeholder="Buscar cliente...">





            </div>









            <table>



                <thead>



                    <tr>



                        <th>

                            Empresa

                        </th>



                        <th>

                            Contacto

                        </th>



                        <th>

                            Correo

                        </th>



                        <th>

                            Plan

                        </th>



                        <th>

                            Estado

                        </th>



                        <th>

                            Acciones

                        </th>



                    </tr>



                </thead>






                <tbody id="clientesTabla">



                    <tr>


                        <td colspan="6">


                            Cargando clientes...


                        </td>


                    </tr>




                </tbody>






            </table>






        </section>





    </main>





</div>







<!-- CARGADOR DE COMPONENTES -->

<script src="../../js/layout.js"></script>




<!-- SEGURIDAD ADMIN -->

<script type="module"
src="../js/auth-guard.js"></script>




<!-- FIREBASE CLIENTES -->

<script type="module"
src="../js/clientes.js"></script>




</body>


</html>
