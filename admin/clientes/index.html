<!DOCTYPE html>
<html lang="es-MX">

<head>

<meta charset="UTF-8">

<meta name="robots" content="noindex,nofollow">

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<body>

<div class="admin-layout">

 <!-- Sidebar -->

    <main class="admin-content">


        <!-- Header -->

        <div id="header"></div>


<section class="page-header">
<div>

<h2>

<i class="fa-solid fa-users"></i>

Gestión de Clientes

</h2>



<p>

Administración de empresas y usuarios registrados.

</p>



</div>







<div class="page-actions">

<a href="nuevo.html"
class="btn-primary">


<i class="fa-solid fa-plus"></i>


Nuevo cliente


</a>




</div>

</section>

<section class="client-summary">

<div class="client-card">


<i class="fa-solid fa-building"></i>

<div>


<span>

Clientes registrados

</span>



<strong id="totalClientes">

0

</strong>



</div>



</div>

<div class="client-card">



<i class="fa-solid fa-user-check"></i>

<div>


<span>

Usuarios creados

</span>



<strong id="totalUsuarios">

0

</strong>



</div>



</div>

</section>

<section class="table-container">

<h3>

Clientes registrados

</h3>





<input

type="search"

id="buscarCliente"

placeholder="Buscar cliente...">

</div>

<table>



<thead>



<tr>


<th>
Empresa
</th>


<th>
Contacto
</th>


<th>
Correo
</th>


<th>
Plan
</th>


<th>
Estado
</th>


<th>
Acciones
</th>


</tr>



</thead>

<tbody id="clientesTabla">



<tr>


<td colspan="6">

Cargando clientes...

</td>


</tr>



</tbody>





</table>







</section>






</main>






</div>

src="../js/auth-guard.js"></script>

src="../js/clientes.js"></script>
