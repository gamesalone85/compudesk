<!DOCTYPE html>
<html lang="es-MX">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Tickets | Compu Desk
</title>


<meta name="robots" content="noindex,nofollow">



<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">



<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link
rel="stylesheet"
href="/css/portal.css">

<link
rel="stylesheet"
href="/admin/css/dashboard.css">


</head>



<body>


<div class="admin-layout">



<div id="sidebar-container"></div>



<section class="admin-main">



<div id="header-container"></div>




<main class="dashboard-container">



<div class="dashboard-title">


<h1>
Tickets
</h1>


<p>
Gestión de incidencias y solicitudes
</p>


</div>





<!-- KPIs -->

<section class="kpi-grid">



<article class="kpi-card">


<div class="kpi-icon">

<i class="fa-solid fa-envelope-open"></i>

</div>


<div>

<span>
Abiertos
</span>


<strong id="ticketsAbiertos">
0
</strong>


</div>


</article>





<article class="kpi-card">


<div class="kpi-icon">

<i class="fa-solid fa-spinner"></i>

</div>


<div>

<span>
En proceso
</span>


<strong id="ticketsProceso">
0
</strong>


</div>


</article>





<article class="kpi-card">


<div class="kpi-icon">

<i class="fa-solid fa-clock"></i>

</div>


<div>

<span>
Pendientes
</span>


<strong id="ticketsPendientes">
0
</strong>


</div>


</article>





<article class="kpi-card">


<div class="kpi-icon">

<i class="fa-solid fa-circle-check"></i>

</div>


<div>

<span>
Cerrados
</span>


<strong id="ticketsCerrados">
0
</strong>


</div>


</article>



</section>






<section class="portal-card">



<div id="tablaTickets">

Cargando tickets...

</div>



</section>



</main>



</section>



</div>





<script
type="module"
src="../js/auth-guard.js">
</script>

src="../js/layout.js">

type="module"

</script>
