<!DOCTYPE html>
<html lang="es-MX">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Dashboard Cliente | Compu Desk
</title>


<meta name="robots" content="noindex,nofollow">


<link rel="icon" href="../img/logo.png">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<link rel="stylesheet" href="css/cliente.css">


</head>



<body>



<header class="cliente-header">


<div class="brand">


<img src="../img/logo.png">


<div>

<h2>
Compu Desk
</h2>


<span>
Portal Cliente
</span>


</div>


</div>



<div class="cliente-actions">


<button id="logout">

<i class="fa-solid fa-right-from-bracket"></i>

Salir

</button>


</div>


</header>






<main class="cliente-container">



<section class="welcome-card">


<h1>

Bienvenido,

<span id="nombreCliente">
Cliente
</span>


</h1>


<p id="empresaCliente">

Cargando información...

</p>



</section>








<section class="kpi-grid">



<div class="kpi-card">


<i class="fa-solid fa-ticket"></i>


<div>

<span>
Tickets abiertos
</span>


<strong id="ticketsAbiertos">
0
</strong>


</div>


</div>





<div class="kpi-card">


<i class="fa-solid fa-circle-check"></i>


<div>

<span>
Tickets cerrados
</span>


<strong id="ticketsCerrados">
0
</strong>


</div>


</div>





<div class="kpi-card">


<i class="fa-solid fa-building"></i>


<div>

<span>
Plan contratado
</span>


<strong id="planCliente">
-
</strong>


</div>


</div>



</section>









<section class="empresa-card">


<div class="section-header">


<h2>

Información empresarial

</h2>


</div>



<div id="datosEmpresa">


Cargando...

</div>



</section>









<section class="empresa-card">


<div class="section-header">


<h2>

Acciones rápidas

</h2>


</div>



<div class="quick-actions">


<a href="tickets/nuevo.html">

<i class="fa-solid fa-plus"></i>

Crear ticket

</a>



<a href="tickets/index.html">

<i class="fa-solid fa-list"></i>

Ver tickets

</a>


</div>


</section>



</main>




<script type="module" src="js/auth-guard.js"></script>

<script type="module" src="js/dashboard.js"></script>



</body>

</html>
