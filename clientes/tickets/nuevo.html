href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body>


<div class="cd-app">



<!-- SIDEBAR -->

<aside class="cd-sidebar">


<div class="cd-sidebar-header">


<div class="cd-sidebar-logo">

<img src="../../img/logo.png">

</div>


<div class="cd-sidebar-brand">

<h2>Compu Desk</h2>

<span>Support Center</span>

</div>


</div>



<nav class="cd-menu">

<ul>


<li>

<a href="../dashboard.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>

</li>



<li>

<a href="index.html">

<i class="fa-solid fa-ticket"></i>

<li>

</ul>

</nav>


</aside>






<!-- CONTENIDO -->


<div class="cd-main">



<header class="cd-topbar">


<div class="cd-page-title">


<h1>

Nuevo Ticket

</h1>


<p>

Solicita asistencia técnica.

</p>


</div>


</header>





<main class="cd-content">


<div class="cd-container">



<section class="cd-card">


<div class="cd-card-header">

<div class="cd-card-title">

Crear solicitud

</div>

</div>





<div class="cd-card-body">



<form id="nuevoTicketForm">





<div class="ticket-form-group">


<label>

Categoría

</label>


<select id="categoria">


<option value="">

Selecciona una categoría

</option>


<option>

Hardware

</option>


<option>

Software

</option>


<option>

Redes / WiFi

</option>


<option>

Correo

</option>


<option>

Otro

</option>


</select>


</div>







<div class="ticket-form-group">


<label>

Título del problema

</label>


<input 
type="text"
id="titulo"
placeholder="Ejemplo: Mi computadora no enciende">


</div>







<div class="ticket-form-group">


<label>

Descripción

</label>


<textarea
id="descripcion"
rows="6"
placeholder="Describe detalladamente el problema">
</textarea>


</div>







<div class="ticket-form-group">


<label>

Prioridad

</label>


<select id="prioridad">


<option>

Baja

</option>


<option selected>

Media

</option>


<option>

Alta

</option>


<option>

Crítica

</option>


</select>


</div>






<button 
type="submit"
class="ticket-button">


<i class="fa-solid fa-paper-plane"></i>


Enviar Ticket


</button>





</form>





<div id="mensajeTicket"></div>




</div>



</section>



</div>


</main>



</div>



</div>





<script src="../js/nuevo-ticket.js"></script>


</body>

</html>
