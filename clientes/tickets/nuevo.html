<!DOCTYPE html>
<html lang="es-MX">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Nuevo Ticket | Compu Desk
</title>


<link rel="icon" href="../../img/logo.png">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<link rel="stylesheet" href="../css/cliente.css">

</head>


<body>


<header class="cliente-header">


<div class="brand">

<img src="../../img/logo.png">

<div>

<h2>
Compu Desk
</h2>

<span>
Nuevo Ticket
</span>

</div>

</div>



</header>





<main class="cliente-container">


<section class="empresa-card">


<h2>

Crear solicitud de soporte

</h2>



<form id="ticketForm">



<div class="input-group">

<label>
Categoría
</label>


<select id="categoria" required>

<option value="">
Seleccione
</option>

<option>
Hardware
</option>

<option>
Software
</option>

<option>
Redes
</option>

<option>
Sistemas
</option>

<option>
Otro
</option>


</select>


</div>





<div class="input-group">

<label>
Prioridad
</label>


<select id="prioridad" required>


<option value="baja">
Baja
</option>


<option value="media" selected>
Media
</option>


<option value="alta">
Alta
</option>


<option value="critica">
Crítica
</option>


</select>


</div>





<div class="input-group">


<label>
Título del problema
</label>


<input
id="titulo"
type="text"
placeholder="Ejemplo: Equipo no enciende"
required>


</div>






<div class="input-group">


<label>
Descripción

</label>


<textarea
id="descripcion"
rows="6"
placeholder="Describe detalladamente el problema..."
required></textarea>


</div>







<button
class="login-button"
type="submit">

<i class="fa-solid fa-paper-plane"></i>

Enviar ticket


</button>





<div id="mensaje"></div>




</form>



</section>


</main>





<script type="module" src="../js/auth-guard.js"></script>

<script type="module" src="../js/nuevo-ticket.js"></script>


</body>

</html>
